<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reise-Globus</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.apple-mapkit.com/mk/5.x.x/mapkit.js" type="text/javascript"></script>
    <style>
        #map {
            width: 100%;
            height: 500px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Meine Reisen</h1>
    </header>

    <main>
        <div id="map"></div>
        <div id="album">
            <div class="album-header">
                <h2>Fotos von <span id="location-name"></span></h2>
            </div>
            <div class="album-photos" id="photo-container">
                <!-- Fotos werden dynamisch hier eingefügt -->
            </div>
        </div>
    </main>

    <script>
        mapkit.init({
            authorizationCallback: function(done) {
                done("DEIN_JAVA_SCRIPT_KEY");
            }
        });

        var map = new mapkit.Map("map", {
            center: new mapkit.Coordinate(37.7749, -122.4194), // Beispielkoordinaten (San Francisco)
            zoom: 10
        });
    </script>
</body>
</html>
